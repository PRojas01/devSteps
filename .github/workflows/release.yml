name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: devSteps ${{ github.ref_name }}
          body: |
            ## devSteps ${{ github.ref_name }}

            Orchestrator for AI-assisted project lifecycles.

            ### Install

            ```bash
            npm install -g sp-devsteps
            ```

            ### What's new
            See [CHANGELOG.md](https://github.com/PRojas01/devSteps/blob/main/CHANGELOG.md)
          draft: false
          prerelease: false

      - name: Publish to npm
        continue-on-error: true
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
